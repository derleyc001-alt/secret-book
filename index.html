<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Shooting Heart</title>

<style>

body{
margin:0;
overflow:hidden;
background:#14003a;
font-family:Arial;
}

canvas{
position:absolute;
top:0;
left:0;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#ff2a6d;
border:none;
color:white;
cursor:pointer;
}

#cat{
position:fixed;
bottom:30px;
left:30px;
font-size:60px;
display:none;
}

#canvas{
display:none;
}

</style>

</head>

<body>

<div id="login">

<h2>Digite a senha</h2>

<input id="password" type="password">

<br><br>

<button onclick="enter()">Entrar</button>

<p id="error"></p>

</div>

<canvas id="canvas"></canvas>

<div id="cat">🐱</div>

<script>

const PASSWORD="9837172"

function enter(){

let pass=document.getElementById("password").value

if(pass===PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("canvas").style.display="block"
document.getElementById("cat").style.display="block"

start()

}else{

document.getElementById("error").innerText="senha incorreta"

}

}

function start(){

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]
let shooting=[]
let hearts=[]
let targets=[]

for(let i=0;i<250;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
})

}

function spawnStar(){

shooting.push({
x:Math.random()canvas.width,
y:0,
vx:-4,
vy:4,
life:100
})

}

setInterval(spawnStar,2500)

ctx.font="bold "+Math.min(canvas.width/10,80)+"px Arial"
ctx.textAlign="center"

ctx.fillText(
"I LOVE YOU, BEAUTIFUL",
canvas.width/2,
canvas.height/3
)

let data=ctx.getImageData(0,0,canvas.width,canvas.height).data

for(let y=0;y<canvas.height;y+=6){
for(let x=0;x<canvas.width;x+=6){

let index=(ycanvas.width+x)*4

if(data[index+3]>128){
targets.push({x,y})
}

}
}

ctx.clearRect(0,0,canvas.width,canvas.height)

function shoot(){

if(targets.length>0){

let t=targets.shift()

hearts.push({
x:100,
y:canvas.height-90,
tx:t.x,
ty:t.y
})

}

}

setInterval(shoot,25)

function animate(){

ctx.fillStyle="rgba(20,0,58,0.35)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{
ctx.fillRect(s.x,s.y,s.size,s.size)
})

shooting.forEach((s,i)=>{

s.x+=s.vx
s.y+=s.vy
s.life--

ctx.fillRect(s.x,s.y,2,2)

if(s.life<=0){
shooting.splice(i,1)
}

})

hearts.forEach(h=>{

h.x+=(h.tx-h.x)*0.05
h.y+=(h.ty-h.y)*0.05

ctx.fillStyle="#ff2a6d"
ctx.font="14px Arial"
ctx.fillText("❤",h.x,h.y)

})

requestAnimationFrame(animate)

}

animate()

}

</script>

</body>
</html
